<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIGPI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <h2>Login / Cadastro SIGPI</h2>
        <form id="authForm" action="#" onsubmit="return false;">
            <div class="form-group">
                <label for="username">Usuário:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="profile">Tipo de usuário:</label>
                <select id="profile" name="profile" required>
                    <option value="aluno">Aluno</option>
                    <option value="professor">Professor</option>
                    <option value="coordenacao">Coordenação</option>
                    <option value="empresa">Empresa parceira</option>
                </select>
            </div>
            <div class="button-group">
                <button type="submit" id="loginButton">Entrar</button>
                <button type="button" id="registerButton">Cadastrar</button>
            </div>
            <p id="message" class="message"></p>
        </form>
    </div>
    <script src="js/main.js?v=4"></script>
</body>
</html>
